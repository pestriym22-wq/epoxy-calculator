<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>Прорахунок матеріалу · Epoxyshop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#0A84FF;--blue-grad:linear-gradient(180deg,#37A2FF 0%,#0A84FF 100%);
  --blue-glow:rgba(10,132,255,.5);--canvas:#000;--card-bg:rgba(24,24,27,.85);
  --card-border:rgba(255,255,255,.10);--card-divider:rgba(255,255,255,.08);
  --ink:#fff;--sub:#A1A1AA;--radius:22px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{overscroll-behavior-y:none;}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background-color:var(--canvas);
  background-image:radial-gradient(circle at 50% 100%,#004C99 0%,#000 55%);
  background-attachment:fixed;background-size:cover;
  color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100dvh;
}
.app{width:100%;max-width:440px;margin:0 auto;padding:16px 12px 100px;position:relative;z-index:1;}
.nav{
  position:sticky;top:0;z-index:100;
  background:rgba(0,0,0,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--card-border);
  padding:13px 16px;display:flex;align-items:center;gap:10px;
  margin:0 -12px 16px;width:calc(100% + 24px);
}
.nav-title{
  font-family:'Montserrat',sans-serif;font-size:13px;font-weight:900;
  text-transform:uppercase;letter-spacing:1px;
  background:linear-gradient(180deg,#fff 40%,#aaa 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.card{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:var(--radius);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  overflow:hidden;margin-bottom:12px;box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.card-header{
  background:linear-gradient(90deg,rgba(255,255,255,.02),rgba(255,255,255,.05));
  border-bottom:1px solid var(--card-divider);padding:14px 18px;
}
.card-header-title{
  font-family:'Montserrat',sans-serif;font-size:12px;font-weight:900;
  text-transform:uppercase;letter-spacing:1px;color:var(--ink);
}
.area-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;gap:12px;
}
.area-lbl{font-size:14px;font-weight:500;color:var(--sub);}
.area-rhs{display:flex;align-items:center;gap:8px;}
.area-input{
  width:80px;height:48px;
  background:rgba(255,255,255,.06);border:1px solid rgba(10,132,255,.4);
  border-radius:12px;font-family:'Inter',sans-serif;
  font-size:26px;font-weight:900;letter-spacing:-1px;
  color:var(--ink);text-align:center;outline:none;
  -moz-appearance:textfield;appearance:textfield;
  transition:border-color .15s,box-shadow .15s;
}
.area-input::-webkit-inner-spin-button,
.area-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.area-input:focus{border-color:var(--blue);box-shadow:0 0 16px rgba(10,132,255,.3);}
.area-unit{font-size:15px;font-weight:600;color:var(--sub);}
.tabs-wrap{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:4px;padding:8px;
}
.type-tab{
  background:transparent;border:1px solid transparent;
  border-radius:12px;padding:9px 3px;
  font-family:'Inter',sans-serif;font-size:11px;font-weight:400;color:var(--sub);
  cursor:pointer;text-align:center;line-height:1.45;
  transition:all .15s;
}
.type-tab.on{
  background:rgba(10,132,255,.15);border-color:rgba(10,132,255,.5);
  color:var(--ink);font-weight:700;box-shadow:0 0 12px rgba(10,132,255,.2);
}
.mat-row{padding:16px 18px;border-bottom:1px solid var(--card-divider);}
.mat-row:last-child{border-bottom:none;}
.mat-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.mat-info{flex:1;min-width:0;}
.mat-name{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:3px;}
.mat-desc{font-size:12px;color:var(--sub);}
.mat-price{
  font-family:'Montserrat',sans-serif;font-size:20px;font-weight:900;letter-spacing:-.5px;
  color:var(--blue);text-shadow:0 0 20px rgba(10,132,255,.5);
  white-space:nowrap;padding-left:6px;
}
.mat-chips{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.chip-kg{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:6px;padding:3px 9px;font-size:12px;font-weight:700;color:var(--ink);
}
.chip-pkgs{font-size:12px;color:var(--sub);}
.rate-row{
  display:flex;align-items:center;gap:10px;
  margin-top:12px;padding-top:12px;border-top:1px solid var(--card-divider);
}
.rate-lbl{font-size:12px;color:var(--sub);flex:1;}
.stepper{
  display:flex;align-items:center;
  background:rgba(255,255,255,.06);border:1px solid rgba(10,132,255,.3);
  border-radius:10px;overflow:hidden;flex-shrink:0;
}
.stp-btn{
  width:36px;height:36px;background:none;border:none;
  color:var(--blue);font-size:20px;font-weight:300;line-height:1;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .1s,transform .08s;
}
.stp-btn:active{background:rgba(10,132,255,.15);transform:scale(.88);}
.stp-btn:disabled{color:rgba(255,255,255,.2);cursor:default;}
.stp-val{min-width:44px;text-align:center;font-size:15px;font-weight:700;color:var(--ink);padding:0 2px;}
.stp-unit{font-size:11px;color:var(--sub);padding-right:10px;}
.flok-row{
  margin-top:12px;padding-top:12px;border-top:1px solid var(--card-divider);
  display:flex;gap:6px;flex-wrap:wrap;
}
.flok-chip{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:8px;padding:6px 11px;font-family:'Inter',sans-serif;
  font-size:11px;font-weight:500;color:var(--sub);cursor:pointer;transition:all .12s;
}
.flok-chip.on{
  background:rgba(10,132,255,.2);border-color:var(--blue);color:var(--ink);font-weight:700;
  box-shadow:0 0 10px rgba(10,132,255,.2);
}
.tog-btn{
  position:relative;width:46px;height:28px;
  border:none;background:none;padding:0;cursor:pointer;flex-shrink:0;
}
.tog-track{
  position:absolute;inset:0;background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.18);border-radius:9999px;
  transition:background .2s,border-color .2s;pointer-events:none;
}
.tog-btn.on .tog-track{background:var(--blue);border-color:var(--blue);box-shadow:0 0 14px var(--blue-glow);}
.tog-thumb{
  position:absolute;top:3px;left:3px;width:22px;height:22px;
  background:rgba(255,255,255,.4);border-radius:50%;
  transition:transform .2s,background .2s;pointer-events:none;
}
.tog-btn.on .tog-thumb{background:#fff;transform:translateX(18px);}
.total-card{
  background:var(--card-bg);border:1px solid rgba(10,132,255,.35);
  border-radius:var(--radius);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:0 0 40px rgba(10,132,255,.15),0 20px 60px rgba(0,0,0,.6);
  overflow:hidden;margin-bottom:12px;
}
.total-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 24px;gap:12px;
}
.total-lbl{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;color:var(--sub);margin-bottom:4px;}
.total-area{font-size:12px;color:rgba(255,255,255,.25);}
.total-sum{
  font-family:'Montserrat',sans-serif;
  font-size:42px;font-weight:900;letter-spacing:-2px;
  background:linear-gradient(180deg,#fff 30%,#aaa 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap;
}
.foot{
  text-align:center;margin-top:24px;
  font-size:11px;color:rgba(255,255,255,.2);line-height:1.7;
}
</style>
</head>
<body>
<div class="app">

  <nav class="nav">
    <!-- Calculator icon -->
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
      <rect x="2" y="2" width="16" height="16" rx="3" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
      <rect x="5" y="5" width="4" height="3" rx="1" fill="#0A84FF"/>
      <rect x="5" y="10" width="2" height="2" rx=".5" fill="rgba(255,255,255,0.5)"/>
      <rect x="9" y="10" width="2" height="2" rx=".5" fill="rgba(255,255,255,0.5)"/>
      <rect x="13" y="10" width="2" height="2" rx=".5" fill="rgba(255,255,255,0.5)"/>
      <rect x="5" y="13" width="2" height="2" rx=".5" fill="rgba(255,255,255,0.5)"/>
      <rect x="9" y="13" width="2" height="2" rx=".5" fill="rgba(255,255,255,0.5)"/>
      <rect x="13" y="13" width="2" height="2" rx=".5" fill="#0A84FF"/>
      <rect x="11" y="5" width="4" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
    </svg>
    <span class="nav-title">Прорахунок матеріалу</span>
  </nav>

  <!-- Area -->
  <div class="card">
    <div class="area-row">
      <span class="area-lbl">Площа підлоги</span>
      <div class="area-rhs">
        <input id="ain" class="area-input" type="number"
               value="30" min="1" max="9999" step="1" inputmode="numeric">
        <span class="area-unit">м²</span>
      </div>
    </div>
  </div>

  <!-- Type tabs -->
  <div class="card">
    <div class="card-header"><span class="card-header-title">Тип покриття</span></div>
    <div class="tabs-wrap" id="tabs">
      <button class="type-tab on" data-t="roller">Однотонне<br>під валик</button>
      <button class="type-tab"   data-t="spatula">Однотонне<br>під шпатель</button>
      <button class="type-tab"   data-t="flok">З флок-<br>чіпсами</button>
      <button class="type-tab"   data-t="art">Epoxy Art<br>мармур</button>
    </div>
  </div>

  <!-- Materials -->
  <div id="mats"></div>

  <!-- Total -->
  <div id="tot"></div>

  <footer class="foot">
    Прорахунок матеріалу · Оновлення в реальному часі<br>
    Оптимальний підбір фасування за найнижчою ціною
  </footer>

</div>
<script>
(function(){
'use strict';

const S={area:30,tab:'roller',flok:'partial',gr:.30,ro:.30,sp:1.00,ar:2.00,lkOn:false,lk:100,
         flRo:.50,flkLkOn:false,flkLk:100,spLkOn:false,spLk:100,smOn:true};
const RC={
  gr:   {min:.30,max:.40, step:.05,lbl:'Витрата ґрунту',  unit:'кг/м²'},
  ro:   {min:.30,max:.50, step:.05,lbl:'Витрата підлоги', unit:'кг/м²'},
  sp:   {min:.50,max:5.0, step:.10,lbl:'Витрата підлоги', unit:'кг/м²'},
  ar:   {min:2.0,max:3.0, step:.50,lbl:'Витрата підлоги', unit:'кг/м²'},
  lk:   {min:100,max:150, step:25, lbl:'Витрата лаку',    unit:'г/м²'},
  flRo: {min:.50,max:1.0, step:.10,lbl:'Витрата підлоги', unit:'кг/м²'},
  flkLk:{min:100,max:150, step:25, lbl:'Витрата лаку',    unit:'г/м²'},
  spLk: {min:100,max:150, step:25, lbl:'Витрата лаку',    unit:'г/м²'},
};
const NOVAK=[{s:1,p:780},{s:4.5,p:1950},{s:10,p:3850}];
const ARTP =[{s:1,p:780},{s:4.5,p:2930},{s:10,p:5730}];
const GRNT =[{s:1,p:540}];
const SMLA =[{s:1,p:580}];
const LAK  =[{s:1,p:1800},{s:6,p:8000}];

function cheap(area,pkgs,rate){
  if(!area||area<=0)return{cost:0,ps:[],kg:0};
  const EPS=1e-9;
  const p=pkgs.map(pk=>({...pk,cov:pk.s/rate})).sort((a,b)=>b.cov-a.cov);
  let B={cost:Infinity,ps:[],kg:0};
  const m0=Math.ceil(area/p[0].cov);
  for(let i=0;i<=m0;i++){
    const r0=area-i*p[0].cov;
    if(p.length===1){if(r0<=EPS){const c=i*p[0].p;if(c<B.cost)B={cost:c,ps:[{n:i,s:p[0].s}].filter(x=>x.n),kg:i*p[0].s}}continue;}
    const m1=r0>0?Math.ceil(r0/p[1].cov):0;
    for(let j=0;j<=m1;j++){
      const r1=r0-j*p[1].cov;
      if(p.length===2){if(i*p[0].cov+j*p[1].cov>=area-EPS){const c=i*p[0].p+j*p[1].p;if(c<B.cost)B={cost:c,ps:[{n:i,s:p[0].s},{n:j,s:p[1].s}].filter(x=>x.n),kg:i*p[0].s+j*p[1].s}}continue;}
      const k=r1>EPS?Math.ceil(r1/p[2].cov):0;
      if(i*p[0].cov+j*p[1].cov+k*p[2].cov>=area-EPS){
        const c=i*p[0].p+j*p[1].p+k*p[2].p;
        if(c<B.cost)B={cost:c,ps:[{n:i,s:p[0].s},{n:j,s:p[1].s},{n:k,s:p[2].s}].filter(x=>x.n),kg:i*p[0].s+j*p[1].s+k*p[2].s};
      }
    }
  }
  return B;
}

const fN=n=>Math.round(n).toLocaleString('uk-UA');
const fK=n=>n%1===0?String(n):String(parseFloat(n.toFixed(2))).replace('.',',');
const fR=r=>String(parseFloat(r.toFixed(2))).replace('.',',');
const pStr=ps=>ps.map(x=>`${x.n}×${fK(x.s)}\u00a0кг`).join(' + ')||'—';

function matRow(name,desc,res,extra){
  return`<div class="mat-row">
    <div class="mat-top">
      <div class="mat-info">
        <div class="mat-name">${name}</div>
        <div class="mat-desc">${desc}</div>
      </div>
      <div class="mat-price">${res.cost?fN(res.cost)+'\u00a0₴':'—'}</div>
    </div>
    <div class="mat-chips">
      <span class="chip-kg">${fK(res.kg)}\u00a0кг</span>
      <span class="chip-pkgs">${pStr(res.ps)}</span>
    </div>
    ${extra||''}
  </div>`;
}

function stepper(id,val){
  const cfg=RC[id];
  const atMin=Math.round(val*100)<=Math.round(cfg.min*100);
  const atMax=Math.round(val*100)>=Math.round(cfg.max*100);
  return`<div class="rate-row">
    <span class="rate-lbl">${cfg.lbl}</span>
    <div class="stepper">
      <button class="stp-btn" data-sid="${id}" data-d="-1" ${atMin?'disabled':''}>−</button>
      <span class="stp-val">${fR(val)}</span>
      <span class="stp-unit">${cfg.unit}</span>
      <button class="stp-btn" data-sid="${id}" data-d="1" ${atMax?'disabled':''}>+</button>
    </div>
  </div>`;
}

function flokToggle(){
  return`<div class="flok-row">${[
    ['partial','Часткова\u00a0·\u00a050\u00a0г/м²'],
    ['medium','Середня\u00a0·\u00a0150\u00a0г/м²'],
    ['full','Повна\u00a0·\u00a0350\u00a0г/м²']
  ].map(([id,l])=>`<button class="flok-chip${S.flok===id?' on':''}" data-fl="${id}">${l}</button>`).join('')}</div>`;
}

function lakRow(A){
  const res=S.lkOn?cheap(A,LAK,S.lk/1000):null;
  const desc=S.lkOn?`Водний\u00a0·\u00a0під валик\u00a0·\u00a0${S.lk}\u00a0г/м²`:`Водний\u00a0·\u00a0під валик\u00a0·\u00a0100–150\u00a0г/м²`;
  return`<div class="mat-row">
    <div class="mat-top">
      <div class="mat-info">
        <div class="mat-name">Захисний поліуретановий лак</div>
        <div class="mat-desc">${desc}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding-top:1px">
        ${res?`<div class="mat-price">${fN(res.cost)}\u00a0₴</div>`:''}
        <button class="tog-btn${S.lkOn?' on':''}" id="lak-tog" aria-pressed="${S.lkOn}">
          <span class="tog-track"></span><span class="tog-thumb"></span>
        </button>
      </div>
    </div>
    ${res?`<div class="mat-chips"><span class="chip-kg">${fK(res.kg)}\u00a0кг</span><span class="chip-pkgs">${pStr(res.ps)}</span></div>`:''}
    ${res?stepper('lk',S.lk):''}
  </div>`;
}

function flokLakRow(A){
  const res=S.flkLkOn?cheap(A,LAK,S.flkLk/1000):null;
  const desc=S.flkLkOn?`Водний\u00a0·\u00a0під валик\u00a0·\u00a0${S.flkLk}\u00a0г/м²`:`Водний\u00a0·\u00a0під валик\u00a0·\u00a0100–150\u00a0г/м²`;
  return`<div class="mat-row">
    <div class="mat-top">
      <div class="mat-info">
        <div class="mat-name">Захисний поліуретановий лак</div>
        <div class="mat-desc">${desc}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding-top:1px">
        ${res?`<div class="mat-price">${fN(res.cost)}\u00a0₴</div>`:''}
        <button class="tog-btn${S.flkLkOn?' on':''}" id="flk-lak-tog" aria-pressed="${S.flkLkOn}">
          <span class="tog-track"></span><span class="tog-thumb"></span>
        </button>
      </div>
    </div>
    ${res?`<div class="mat-chips"><span class="chip-kg">${fK(res.kg)}\u00a0кг</span><span class="chip-pkgs">${pStr(res.ps)}</span></div>`:''}
    ${res?stepper('flkLk',S.flkLk):''}
  </div>`;
}

function spatulaLakRow(A){
  const res=S.spLkOn?cheap(A,LAK,S.spLk/1000):null;
  const desc=S.spLkOn?`Водний\u00a0·\u00a0під валик\u00a0·\u00a0${S.spLk}\u00a0г/м²`:`Водний\u00a0·\u00a0під валик\u00a0·\u00a0100–150\u00a0г/м²`;
  return`<div class="mat-row">
    <div class="mat-top">
      <div class="mat-info">
        <div class="mat-name">Захисний поліуретановий лак</div>
        <div class="mat-desc">${desc}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding-top:1px">
        ${res?`<div class="mat-price">${fN(res.cost)}\u00a0₴</div>`:''}
        <button class="tog-btn${S.spLkOn?' on':''}" id="sp-lak-tog" aria-pressed="${S.spLkOn}">
          <span class="tog-track"></span><span class="tog-thumb"></span>
        </button>
      </div>
    </div>
    ${res?`<div class="mat-chips"><span class="chip-kg">${fK(res.kg)}\u00a0кг</span><span class="chip-pkgs">${pStr(res.ps)}</span></div>`:''}
    ${res?stepper('spLk',S.spLk):''}
  </div>`;
}

function smolaRow(A){
  const res=S.smOn?cheap(A,SMLA,.30):null;
  return`<div class="mat-row">
    <div class="mat-top">
      <div class="mat-info">
        <div class="mat-name">Епоксидна смола</div>
        <div class="mat-desc">Запечатка Флоків\u00a0·\u00a00,3\u00a0кг/м²</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding-top:1px">
        ${res?`<div class="mat-price">${fN(res.cost)}\u00a0₴</div>`:''}
        <button class="tog-btn${S.smOn?' on':''}" id="sm-tog" aria-pressed="${S.smOn}">
          <span class="tog-track"></span><span class="tog-thumb"></span>
        </button>
      </div>
    </div>
    ${res?`<div class="mat-chips"><span class="chip-kg">${fK(res.kg)}\u00a0кг</span><span class="chip-pkgs">${pStr(res.ps)}</span></div>`:''}
  </div>`;
}

function render(){
  const A=S.area;
  const g=cheap(A,GRNT,S.gr);
  const gD=`Ґрунтування поверхні\u00a0·\u00a0${fR(S.gr)}\u00a0кг/м²`;
  let rows=[],tot=0;

  if(S.tab==='roller'){
    const f=cheap(A,NOVAK,S.ro);
    rows=[matRow('Епоксидний ґрунт',gD,g,stepper('gr',S.gr)),
          matRow('Підлога Новачок',`Тонкошарове під валик\u00a0·\u00a0${fR(S.ro)}\u00a0кг/м²`,f,stepper('ro',S.ro))];
    tot=g.cost+f.cost;
  }else if(S.tab==='spatula'){
    const f=cheap(A,NOVAK,S.sp);
    const spLkR=S.spLkOn?cheap(A,LAK,S.spLk/1000):{cost:0};
    rows=[matRow('Епоксидний ґрунт',gD,g,stepper('gr',S.gr)),
          matRow('Підлога Новачок',`Наливний шар під шпатель\u00a0·\u00a0${fR(S.sp)}\u00a0кг/м²`,f,stepper('sp',S.sp)),
          spatulaLakRow(A)];
    tot=g.cost+f.cost+spLkR.cost;
  }else if(S.tab==='flok'){
    const f=cheap(A,NOVAK,S.flRo);
    const grams=S.flok==='partial'?50:S.flok==='medium'?150:350;
    const fl=S.flok==='partial'?'Часткова':S.flok==='medium'?'Середня':'Повна';
    const fn=Math.ceil(A*grams/1000),fc=fn*620;
    const sm=cheap(A,SMLA,.30);
    const flkLkR=S.flkLkOn?cheap(A,LAK,S.flkLk/1000):{cost:0};
    const smCost=S.smOn?sm.cost:0;
    rows=[matRow('Епоксидний ґрунт',gD,g,stepper('gr',S.gr)),
          matRow('Підлога Новачок',`Під шпатель+валик\u00a0·\u00a0${fR(S.flRo)}\u00a0кг/м²`,f,stepper('flRo',S.flRo)),
          matRow('Флок-чіпси',`${fl} засипка\u00a0·\u00a0${grams}\u00a0г/м²`,{cost:fc,ps:[{n:fn,s:1}],kg:fn},flokToggle()),
          smolaRow(A),
          flokLakRow(A)];
    tot=g.cost+f.cost+fc+smCost+flkLkR.cost;
  }else{
    const f=cheap(A,ARTP,S.ar);
    const lkR=S.lkOn?cheap(A,LAK,S.lk/1000):{cost:0};
    rows=[matRow('Епоксидний ґрунт',gD,g,stepper('gr',S.gr)),
          matRow('Підлога Epoxy Art',`Ефект мармур\u00a0·\u00a0мін.\u00a0${fR(S.ar)}\u00a0кг/м²`,f,stepper('ar',S.ar)),
          lakRow(A)];
    tot=g.cost+f.cost+lkR.cost;
  }

  document.getElementById('mats').innerHTML=`<div class="card">${rows.join('')}</div>`;

  document.getElementById('tot').innerHTML=A>0?`
    <div class="total-card">
      <div class="total-row">
        <div>
          <div class="total-lbl">Загальна вартість</div>
          <div class="total-area">${fK(A)}\u00a0м²</div>
        </div>
        <div class="total-sum">${fN(tot)}\u00a0₴</div>
      </div>
    </div>`:''
}

document.addEventListener('click',e=>{
  const tb=e.target.closest('#tabs .type-tab');
  if(tb){S.tab=tb.dataset.t;document.querySelectorAll('.type-tab').forEach(b=>b.classList.remove('on'));tb.classList.add('on');render();return;}
  const lt=e.target.closest('#lak-tog');
  if(lt){S.lkOn=!S.lkOn;render();return;}
  const flt=e.target.closest('#flk-lak-tog');
  if(flt){S.flkLkOn=!S.flkLkOn;render();return;}
  const slt=e.target.closest('#sp-lak-tog');
  if(slt){S.spLkOn=!S.spLkOn;render();return;}
  const smt=e.target.closest('#sm-tog');
  if(smt){S.smOn=!S.smOn;render();return;}
  const fl=e.target.closest('[data-fl]');
  if(fl){S.flok=fl.dataset.fl;render();return;}
  const sb=e.target.closest('[data-sid]');
  if(sb){const id=sb.dataset.sid,dir=parseFloat(sb.dataset.d),cfg=RC[id],nv=Math.round((S[id]+dir*cfg.step)*100)/100;if(nv>=cfg.min&&nv<=cfg.max){S[id]=nv;render();}}
});
document.addEventListener('input',e=>{
  if(e.target.id==='ain'){S.area=Math.max(0,parseFloat(e.target.value)||0);render();}
});

render();
})();
</script>
</body>
</html>
